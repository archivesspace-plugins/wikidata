en:
  plugins:
    wikidata:
      label: Wikidata Import
      search:
        query: Wikidata URL or Q ID
        placeholder: e.g. https://www.wikidata.org/wiki/Q42 or Q42
      actions:
        search: Search
        import: Import
        select: Select
      messages:
        none_selected: No Results Selected
        no_results: No Results For Query
        selected: Selected
        import_success: Imported successfully
        import_success_message: Redirecting to the agent record...
        already_imported_title: Already Imported
        already_imported_message: The following entities have already been imported. Click the link to view the existing record.
        import_error: Error while importing from Wikidata
        import_no_agents: No valid agent records to import.
        search_error: Search Error
        search_error_message: A problem was encountered while completing this search. Please ensure the Wikidata service is available.
        service_warning: This plugin depends on the Wikidata API which may have rate limits.
      result_summary: 'Page %{page} - Showing results %{first_record_index} to %{last_record_index} of %{hit_count} matches'
